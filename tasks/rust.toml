# Rust check, lint, and format tasks

["rust:check"]
description = "Check all Rust crates for errors"
run = "cargo check --workspace"
hide = true

["rust:lint"]
description = "Lint Rust code with Clippy (deny warnings)"
run = [
  "cargo clippy --workspace --all-targets -- -D warnings",
  "cargo clippy --manifest-path e2e/rust/Cargo.toml --all-targets -- -D warnings",
]
hide = true

["rust:format"]
description = "Format Rust code"
run = "cargo fmt --all"
hide = true

["rust:format:check"]
description = "Check Rust formatting"
run = "cargo fmt --all -- --check"
hide = true

["rust:verify:telemetry-off"]
description = "Verify telemetry emission code is compiled out with --no-default-features"
run = [
  # Positive control: the default (telemetry-on) gateway must contain the
  # markers, so the absent checks below can never become silently vacuous.
  "cargo build -p openshell-server --bin openshell-gateway",
  "tasks/scripts/verify-telemetry-compiled-out.sh present target/debug/openshell-gateway",
  # Guard: telemetry-free builds must contain no telemetry markers.
  "cargo build -p openshell-server --bin openshell-gateway --no-default-features",
  "tasks/scripts/verify-telemetry-compiled-out.sh absent target/debug/openshell-gateway",
  "cargo build -p openshell-sandbox --bin openshell-sandbox --no-default-features",
  "tasks/scripts/verify-telemetry-compiled-out.sh absent target/debug/openshell-sandbox",
]

["rust:verify:system-ca-roots"]
description = "Verify system-ca-roots feature compiles and excludes bundled Mozilla root crates"
run = [
  # Check that the workspace, including test targets, compiles cleanly under system-ca-roots.
  "cargo check --workspace --all-targets --no-default-features --features system-ca-roots",
  # Guard: webpki-roots must not appear in the production dependency graph.
  "bash -c 'if cargo tree -i webpki-roots --no-default-features --features system-ca-roots 2>/dev/null | grep -q webpki-roots; then echo \"ERROR: webpki-roots found in system-ca-roots production build\" >&2; exit 1; fi'",
  # Guard: webpki-root-certs must not appear either (webpki-roots re-exports it).
  "bash -c 'if cargo tree -i webpki-root-certs --no-default-features --features system-ca-roots 2>/dev/null | grep -q webpki-root-certs; then echo \"ERROR: webpki-root-certs found in system-ca-roots production build\" >&2; exit 1; fi'",
]
