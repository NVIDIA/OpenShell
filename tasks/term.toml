# TUI tasks

[term]
description = "Launch the NemoClaw TUI"
run = "nemoclaw term"
hide = true

["term:dev"]
description = "Launch the NemoClaw TUI with hot-reload on file changes"
run = "cargo watch -s 'nemoclaw term'"
hide = true
