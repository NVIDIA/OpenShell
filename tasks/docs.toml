# Documentation build and preview tasks (Fern)
# Requires Node.js (provided by mise). Fern CLI runs via npx.

["docs"]
description = "Publish Fern documentation to hosted site"
run = "npx fern-api generate --docs"

["docs:build"]
description = "Alias for docs"
depends = ["docs"]

["docs:build:strict"]
description = "Alias for docs (Fern builds are always strict)"
depends = ["docs"]

["docs:preview"]
description = "Generate a Fern preview URL for the current docs"
run = "npx fern-api generate --docs --preview"

["docs:dev"]
description = "Run Fern docs preview server at localhost:3000"
run = "npx fern-api docs dev"

["docs:clean"]
description = "Remove Fern build cache"
run = "rm -rf .fern/"
