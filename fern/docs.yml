# Fern site config — merged with skills/convert-to-fern/assets/theme/nvidia/docs-theme.yml pattern
# Root-hosted preview: internal links use /latest/... (from migrate_to_fern). When you add production
# under docs.nvidia.com/openshell, set instances url + custom-domain to the SAME path and either run
# update_links with the path prefix or enable basepath-aware — see convert-to-fern references/subpath-hosting.md
instances:
  - url: https://openshell.docs.buildwithfern.com

title: NVIDIA OpenShell

footer: ./components/CustomFooter.tsx

layout:
  searchbar-placement: header
  page-width: 1376px
  sidebar-width: 248px
  content-width: 812px
  tabs-placement: header
  hide-feedback: true

colors:
  accentPrimary:
    dark: "#76B900"
    light: "#76B900"
  background:
    light: "#FFFFFF"
    dark: "#000000"

theme:
  page-actions: toolbar
  footer-nav: minimal

logo:
  dark: ./assets/NVIDIA_dark.svg
  light: ./assets/NVIDIA_light.svg
  height: 20
  href: /latest
  right-text: OpenShell

favicon: ./assets/NVIDIA_symbol.svg

js:
  - url: https://assets.adobedtm.com/5d4962a43b79/c1061d2c5e7b/launch-191c2462b890.min.js
    strategy: beforeInteractive

css:
  - ./main.css

navbar-links:
  - type: github
    value: https://github.com/NVIDIA/OpenShell

experimental:
  mdx-components:
    - ./components

versions:
  - display-name: Latest
    path: versions/latest.yml
    slug: latest

redirects:
  # Generated by utils/generate_redirects.py — re-run from convert-to-fern toolkit if needed
  - source: "/index.html"
    destination: "/latest"
  - source: "/index"
    destination: "/latest"
  - source: "/latest/:path*/index.html"
    destination: "/latest/:path*"
  - source: "/:path*/index.html"
    destination: "/:path*"
  - source: "/:path*.html"
    destination: "/:path*"
