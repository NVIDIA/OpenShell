summary: Install via snap on snapd-only system
details: |
    This test installs OpenShell on a system with only snapd (no docker).
    The installer detects snapd and no classic docker, choosing the snap
    install path. This verifies that the snap can be installed, its
    interfaces connected, and the gateway registered.

systems:
    - ubuntu-cloud-24.04-at-snapd-no-docker
    - ubuntu-cloud-26.04-at-snapd-no-docker
    - debian-cloud-13-at-snapd-no-docker
    - fedora-cloud-44-at-snapd-no-docker

execute: |
    cat "$SPREAD_PATH/install.sh" | sh
    which openshell | MATCH "/snap/bin/openshell"
    openshell status | sed 's/\x1b\[[0-9;]*m//g' | MATCH "Status: Connected"
