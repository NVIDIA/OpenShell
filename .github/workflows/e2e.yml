name: E2E

on:
  push:
    branches: [main]
  pull_request:

env:
  MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GHCR_CACHE: ghcr.io/nvidia/nv-agent-env/cache

permissions:
  contents: read
  packages: write

jobs:
  e2e:
    name: E2E
    runs-on: build-amd64
    timeout-minutes: 45
    container:
      image: ghcr.io/nvidia/nv-agent-env/ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --privileged
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
    env:
      IMAGE_TAG: ${{ github.sha }}
      DOCKER_BUILDER: ci-builder
    steps:
      - uses: actions/checkout@v4

      - name: Verify Docker access
        run: docker info

      - name: Configure local registry
        run: |
          # The Docker daemon runs on the host and already trusts 127.0.0.0/8 as
          # insecure registries. All docker commands (push/pull/run) are executed
          # by the daemon, so using 127.0.0.1:5000 for image operations works even
          # though the CI container can't reach that address directly.
          #
          # Start the registry, then verify it's reachable by the daemon.
          docker rm -f navigator-local-registry 2>/dev/null || true
          docker run -d --restart=always --name navigator-local-registry -p 5000:5000 registry:2

          # Verify the daemon can reach the registry (docker exec into a helper)
          for i in $(seq 1 30); do
            docker exec navigator-local-registry wget -qO- http://localhost:5000/v2/ >/dev/null 2>&1 && break
            sleep 1
          done
          docker exec navigator-local-registry wget -qO- http://localhost:5000/v2/

          # Use 127.0.0.1:5000 for push/tag (daemon-side, works with insecure registries)
          # Use host.docker.internal:5000 for k3s pull endpoint (works from any container)
          echo "NAVIGATOR_REGISTRY=127.0.0.1:5000/navigator" >> "$GITHUB_ENV"
          echo "NAVIGATOR_REGISTRY_HOST=127.0.0.1:5000" >> "$GITHUB_ENV"
          echo "NAVIGATOR_REGISTRY_ENDPOINT=host.docker.internal:5000" >> "$GITHUB_ENV"
          echo "NAVIGATOR_REGISTRY_INSECURE=true" >> "$GITHUB_ENV"
          echo "NAVIGATOR_SKIP_REGISTRY_CHECK=1" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Create buildx builder
        run: docker buildx create --use --name ci-builder --driver docker-container

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Build server image
        env:
          DOCKER_CACHE_FROM: "type=registry,ref=${{ env.GHCR_CACHE }}/server:buildcache"
          DOCKER_CACHE_TO: "type=registry,ref=${{ env.GHCR_CACHE }}/server:buildcache,mode=max"
        run: mise run --no-prepare docker:build:server

      - name: Build sandbox image
        env:
          DOCKER_CACHE_FROM: "type=registry,ref=${{ env.GHCR_CACHE }}/sandbox:buildcache"
          DOCKER_CACHE_TO: "type=registry,ref=${{ env.GHCR_CACHE }}/sandbox:buildcache,mode=max"
        run: mise run --no-prepare docker:build:sandbox

      - name: Build cluster image
        env:
          DOCKER_CACHE_FROM: "type=registry,ref=${{ env.GHCR_CACHE }}/cluster:buildcache"
          DOCKER_CACHE_TO: "type=registry,ref=${{ env.GHCR_CACHE }}/cluster:buildcache,mode=max"
        run: mise run --no-prepare docker:build:cluster

      - name: Generate protobuf stubs
        run: mise run --no-prepare python:proto

      - name: Bootstrap and deploy cluster
        run: mise run --no-prepare --skip-deps cluster:build

      - name: Run E2E tests
        run: mise run --no-prepare --skip-deps test:e2e:sandbox
