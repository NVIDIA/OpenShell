name: E2E

on:
  push:
    branches: [main]
  pull_request:

env:
  MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GHCR_CACHE: ghcr.io/nvidia/nv-agent-env/cache

permissions:
  contents: read
  packages: write

jobs:
  e2e:
    name: E2E
    runs-on: build-amd64
    timeout-minutes: 45
    container:
      image: ghcr.io/nvidia/nv-agent-env/ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --privileged
    env:
      IMAGE_TAG: ${{ github.sha }}
      NAVIGATOR_REGISTRY_INSECURE: "false"
      DOCKER_BUILDER: ci-builder
    steps:
      - uses: actions/checkout@v4

      - name: Start Docker daemon
        run: |
          dockerd &
          for i in $(seq 1 30); do
            docker info >/dev/null 2>&1 && break
            sleep 1
          done
          docker info

          # Pre-start the local registry with --network host so it binds
          # directly to the container's loopback interface. The default bridge
          # network port-mapping relies on iptables which may not work inside
          # a privileged container.
          docker rm -f navigator-local-registry 2>/dev/null || true
          docker run -d --restart=always --name navigator-local-registry --network host registry:2
          for i in $(seq 1 30); do
            curl -fsS --max-time 2 http://127.0.0.1:5000/v2/ >/dev/null 2>&1 && break
            sleep 1
          done
          curl -fsS http://127.0.0.1:5000/v2/

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Create buildx builder
        run: docker buildx create --use --name ci-builder --driver docker-container

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Build server image
        env:
          DOCKER_CACHE_FROM: "type=registry,ref=${{ env.GHCR_CACHE }}/server:buildcache"
          DOCKER_CACHE_TO: "type=registry,ref=${{ env.GHCR_CACHE }}/server:buildcache,mode=max"
        run: mise run --no-prepare docker:build:server

      - name: Build sandbox image
        env:
          DOCKER_CACHE_FROM: "type=registry,ref=${{ env.GHCR_CACHE }}/sandbox:buildcache"
          DOCKER_CACHE_TO: "type=registry,ref=${{ env.GHCR_CACHE }}/sandbox:buildcache,mode=max"
        run: mise run --no-prepare docker:build:sandbox

      - name: Build cluster image
        env:
          DOCKER_CACHE_FROM: "type=registry,ref=${{ env.GHCR_CACHE }}/cluster:buildcache"
          DOCKER_CACHE_TO: "type=registry,ref=${{ env.GHCR_CACHE }}/cluster:buildcache,mode=max"
        run: mise run --no-prepare docker:build:cluster

      - name: Generate protobuf stubs
        run: mise run --no-prepare python:proto

      - name: Bootstrap and deploy cluster
        run: mise run --no-prepare --skip-deps cluster:build

      - name: Run E2E tests
        run: mise run --no-prepare --skip-deps test:e2e:sandbox
