name: E2E

on:
  push:
    branches: [main]
  pull_request:

env:
  MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GHCR_CACHE: ghcr.io/nvidia/nv-agent-env/cache

permissions:
  contents: read
  packages: write

jobs:
  e2e:
    name: E2E
    runs-on: build-amd64
    timeout-minutes: 45
    container:
      image: ghcr.io/nvidia/nv-agent-env/ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --privileged
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
    env:
      IMAGE_TAG: ${{ github.sha }}
      DOCKER_BUILDER: ci-builder
      # Use GHCR as the image registry for both push (from CI) and pull (from k3s).
      NAVIGATOR_REGISTRY: ghcr.io/nvidia/nv-agent-env
      NAVIGATOR_REGISTRY_HOST: ghcr.io
      NAVIGATOR_REGISTRY_NAMESPACE: nvidia/nv-agent-env
      NAVIGATOR_REGISTRY_USERNAME: ${{ github.actor }}
      NAVIGATOR_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify Docker access
        run: docker info

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Create buildx builder
        run: docker buildx create --use --name ci-builder --driver docker-container

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Build server image
        env:
          DOCKER_CACHE_FROM: "type=registry,ref=${{ env.GHCR_CACHE }}/server:buildcache"
          DOCKER_CACHE_TO: "type=registry,ref=${{ env.GHCR_CACHE }}/server:buildcache,mode=max"
        run: mise run --no-prepare docker:build:server

      - name: Build sandbox image
        env:
          DOCKER_CACHE_FROM: "type=registry,ref=${{ env.GHCR_CACHE }}/sandbox:buildcache"
          DOCKER_CACHE_TO: "type=registry,ref=${{ env.GHCR_CACHE }}/sandbox:buildcache,mode=max"
        run: mise run --no-prepare docker:build:sandbox

      - name: Build cluster image
        env:
          DOCKER_CACHE_FROM: "type=registry,ref=${{ env.GHCR_CACHE }}/cluster:buildcache"
          DOCKER_CACHE_TO: "type=registry,ref=${{ env.GHCR_CACHE }}/cluster:buildcache,mode=max"
        run: mise run --no-prepare docker:build:cluster

      - name: Generate protobuf stubs
        run: mise run --no-prepare python:proto

      - name: Bootstrap and deploy cluster
        run: mise run --no-prepare --skip-deps cluster:build

      - name: Fix gateway endpoint for CI networking
        run: |
          # The cluster container binds the gateway port to the Docker host's
          # 0.0.0.0:8080. From inside the CI container, 127.0.0.1 is our own
          # loopback — not the host's. We need to reach the host via the Docker
          # bridge gateway IP.
          #
          # "host.docker.internal" is already in the server certificate's SANs,
          # so we just need DNS resolution + metadata pointing there.

          # Determine the Docker bridge gateway IP (host IP from container's perspective)
          BRIDGE_IP=$(docker network inspect bridge --format '{{(index .IPAM.Config 0).Gateway}}')
          echo "Docker bridge gateway IP: ${BRIDGE_IP}"

          # Ensure host.docker.internal resolves to the bridge gateway
          if ! getent hosts host.docker.internal >/dev/null 2>&1; then
            echo "${BRIDGE_IP} host.docker.internal" >> /etc/hosts
          fi

          # Verify connectivity to the gateway through the bridge IP
          curl -fsSk --max-time 5 "https://host.docker.internal:8080" || true

          # Patch the cluster metadata so the Python client connects via
          # host.docker.internal instead of 127.0.0.1
          CLUSTER_NAME=${CLUSTER_NAME:-$(basename "$PWD")}
          METADATA="${HOME}/.config/navigator/clusters/${CLUSTER_NAME}_metadata.json"
          if [ -f "${METADATA}" ]; then
            echo "Before patching:"
            cat "${METADATA}"
            sed -i 's|https://127\.0\.0\.1:|https://host.docker.internal:|g' "${METADATA}"
            echo "After patching:"
            cat "${METADATA}"
          else
            echo "WARNING: metadata file not found at ${METADATA}"
            ls -la "${HOME}/.config/navigator/clusters/" || true
          fi

      - name: Run E2E tests
        run: mise run --no-prepare --skip-deps test:e2e:sandbox
