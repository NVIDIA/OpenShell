name: E2E

on:
  push:
    branches: [main]
  pull_request:

env:
  MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GHCR_CACHE: ghcr.io/nvidia/nv-agent-env/cache

permissions:
  contents: read
  packages: write

jobs:
  e2e:
    name: E2E
    runs-on: build-amd64
    timeout-minutes: 45
    container:
      image: ghcr.io/nvidia/nv-agent-env/ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --privileged
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
    env:
      IMAGE_TAG: ${{ github.sha }}
      DOCKER_BUILDER: ci-builder
    steps:
      - uses: actions/checkout@v4

      - name: Verify Docker access
        run: docker info

      - name: Configure local registry
        run: |
          # The CI container runs on Docker's bridge network while the Docker
          # daemon is on the host. Containers started via `docker run -p 5000:5000`
          # bind to the host's 127.0.0.1, which is unreachable from this container.
          # Resolve the host gateway IP so the bootstrap scripts can reach the
          # local registry.
          GATEWAY=$(docker network inspect bridge --format '{{(index .IPAM.Config 0).Gateway}}')
          echo "Docker host gateway: ${GATEWAY}"

          # Start the registry now so bootstrap doesn't have to.
          docker rm -f navigator-local-registry 2>/dev/null || true
          docker run -d --restart=always --name navigator-local-registry -p 5000:5000 registry:2

          # Wait for the registry to be reachable via the gateway IP
          for i in $(seq 1 30); do
            curl -fsS --max-time 2 "http://${GATEWAY}:5000/v2/" >/dev/null 2>&1 && break
            sleep 1
          done
          curl -fsS "http://${GATEWAY}:5000/v2/"

          # Tell cluster-bootstrap.sh to use the gateway IP for the registry.
          # NAVIGATOR_REGISTRY / _HOST: used by the CI container to tag+push images.
          # NAVIGATOR_REGISTRY_ENDPOINT: used by the k3s cluster container to pull
          # images — host.docker.internal resolves to the Docker host from inside
          # any container on the bridge network.
          echo "NAVIGATOR_REGISTRY=${GATEWAY}:5000/navigator" >> "$GITHUB_ENV"
          echo "NAVIGATOR_REGISTRY_HOST=${GATEWAY}:5000" >> "$GITHUB_ENV"
          echo "NAVIGATOR_REGISTRY_ENDPOINT=host.docker.internal:5000" >> "$GITHUB_ENV"
          echo "NAVIGATOR_REGISTRY_INSECURE=true" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Create buildx builder
        run: docker buildx create --use --name ci-builder --driver docker-container

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Build server image
        env:
          DOCKER_CACHE_FROM: "type=registry,ref=${{ env.GHCR_CACHE }}/server:buildcache"
          DOCKER_CACHE_TO: "type=registry,ref=${{ env.GHCR_CACHE }}/server:buildcache,mode=max"
        run: mise run --no-prepare docker:build:server

      - name: Build sandbox image
        env:
          DOCKER_CACHE_FROM: "type=registry,ref=${{ env.GHCR_CACHE }}/sandbox:buildcache"
          DOCKER_CACHE_TO: "type=registry,ref=${{ env.GHCR_CACHE }}/sandbox:buildcache,mode=max"
        run: mise run --no-prepare docker:build:sandbox

      - name: Build cluster image
        env:
          DOCKER_CACHE_FROM: "type=registry,ref=${{ env.GHCR_CACHE }}/cluster:buildcache"
          DOCKER_CACHE_TO: "type=registry,ref=${{ env.GHCR_CACHE }}/cluster:buildcache,mode=max"
        run: mise run --no-prepare docker:build:cluster

      - name: Generate protobuf stubs
        run: mise run --no-prepare python:proto

      - name: Bootstrap and deploy cluster
        run: mise run --no-prepare --skip-deps cluster:build

      - name: Run E2E tests
        run: mise run --no-prepare --skip-deps test:e2e:sandbox
