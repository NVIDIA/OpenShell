name: Temporary Gateway macOS Binary

on:
  push:
    branches:
      - fix/gateway-macos-bundled-z3
  workflow_dispatch:

permissions:
  contents: read
  packages: read

defaults:
  run:
    shell: bash

jobs:
  gateway-macos-binary:
    name: Gateway Binary (macOS)
    runs-on: linux-amd64-cpu8
    timeout-minutes: 60
    container:
      image: ghcr.io/nvidia/openshell/ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --privileged
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Set up Docker Buildx
        uses: ./.github/actions/setup-buildx

      - name: Build macOS gateway binary
        run: |
          set -euo pipefail
          docker buildx build \
            --file deploy/docker/Dockerfile.gateway-macos \
            --build-arg CARGO_TARGET_CACHE_SCOPE="${{ github.sha }}" \
            --target binary \
            --output type=local,dest=out/ \
            .

      - name: Verify binary
        run: test -x out/openshell-gateway
