# Publishes the Fern documentation site when a docs tag is pushed or manually triggered.
#
# Example:  git tag docs/v1.2.0 && git push origin docs/v1.2.0
# Or use "Run workflow" in the Actions tab.
#
# Requires org/repo secret: DOCS_FERN_TOKEN (from `fern token` for the Fern org).

name: Publish Fern Docs

on:
  push:
    tags:
      - "docs/v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install Fern CLI
        run: npm install -g fern-api

      - name: Generate library reference MDX (autodocs)
        env:
          FERN_TOKEN: ${{ secrets.DOCS_FERN_TOKEN }}
        working-directory: ./fern
        run: fern docs md generate

      - name: Publish Docs
        env:
          FERN_TOKEN: ${{ secrets.DOCS_FERN_TOKEN }}
        working-directory: ./fern
        run: fern generate --docs
