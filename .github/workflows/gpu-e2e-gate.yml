name: GPU E2E Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled, ready_for_review]
  workflow_run:
    workflows: ["GPU Test"]
    types: [completed]

permissions: {}

jobs:
  check:
    permissions:
      contents: read
      pull-requests: read
      actions: read
    uses: ./.github/workflows/e2e-gate-check.yml
    with:
      required_label: test:e2e-gpu
      workflow_file: test-gpu.yml
