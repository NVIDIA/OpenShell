name: E2E Test

on:
  workflow_dispatch:
    inputs:
      image-tag:
        description: "Image tag to test (typically the commit SHA)"
        required: true
        type: string
      runner:
        description: "GitHub Actions runner label for the core E2E suite and optional smoke slices"
        required: false
        type: string
        default: "build-amd64"
      run-tool-smoke-validations:
        description: "Add the first-class tool smoke evidence slice after the core E2E suite"
        required: false
        type: boolean
        default: false
      run-installer-selection-smoke:
        description: "Add the installer selection smoke slice after the core E2E suite"
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      image-tag:
        description: "Image tag to test (typically the commit SHA)"
        required: true
        type: string
      runner:
        description: "GitHub Actions runner label for the core E2E suite and optional smoke slices"
        required: false
        type: string
        default: "build-amd64"
      run-tool-smoke-validations:
        description: "Add the first-class tool smoke evidence slice after the core E2E suite"
        required: false
        type: boolean
        default: false
      run-installer-selection-smoke:
        description: "Add the installer selection smoke slice after the core E2E suite"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: read

jobs:
  e2e:
    name: E2E
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 30
    container:
      image: ghcr.io/nvidia/openshell/ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --privileged
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
    env:
      MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      IMAGE_TAG: ${{ inputs.image-tag }}
      OPENSHELL_REGISTRY: ghcr.io/nvidia/openshell
      OPENSHELL_REGISTRY_HOST: ghcr.io
      OPENSHELL_REGISTRY_NAMESPACE: nvidia/openshell
      OPENSHELL_REGISTRY_USERNAME: ${{ github.actor }}
      OPENSHELL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Pull cluster image
        run: docker pull ghcr.io/nvidia/openshell/cluster:${{ inputs.image-tag }}

      - name: Install Python dependencies and generate protobuf stubs
        run: uv sync --frozen && mise run --no-prepare python:proto

      - name: Bootstrap and deploy cluster
        env:
          GATEWAY_HOST: host.docker.internal
          GATEWAY_PORT: "8080"
          SKIP_IMAGE_PUSH: "1"
          SKIP_CLUSTER_IMAGE_BUILD: "1"
          OPENSHELL_CLUSTER_IMAGE: ghcr.io/nvidia/openshell/cluster:${{ inputs.image-tag }}
        run: mise run --no-prepare --skip-deps cluster

      - name: Install SSH client for Rust CLI e2e tests
        run: apt-get update && apt-get install -y --no-install-recommends openssh-client && rm -rf /var/lib/apt/lists/*

      - name: Run core E2E suite
        run: |
          mise run --no-prepare --skip-deps e2e:python
          mise run --no-prepare --skip-deps e2e:rust

      - name: Record tool smoke evidence slice
        if: ${{ inputs.run-tool-smoke-validations }}
        run: |
          printf 'Enabled first-class tool smoke evidence slice for image-tag=%s\n' "${IMAGE_TAG}"
          {
            printf '## Tool Smoke Evidence Slice\n\n'
            printf -- '- Trigger: `run-tool-smoke-validations=true`\n'
            printf -- '- Image tag: `%s`\n' "${IMAGE_TAG}"
            printf -- '- Contract: run `tool_adapter_smoke` after the core E2E suite\n'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run first-class tool smoke evidence slice
        if: ${{ inputs.run-tool-smoke-validations }}
        run: cargo test --manifest-path e2e/rust/Cargo.toml --features e2e --test tool_adapter_smoke -- --nocapture

      - name: Run installer selection smoke slice
        if: ${{ inputs.run-installer-selection-smoke }}
        run: bash e2e/install/bash_test.sh
