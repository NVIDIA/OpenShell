name: Test Install Script

on:
  pull_request:
    paths:
      - 'install.sh'
      - 'install-dev.sh'
      - 'e2e/install/**'
      - '.github/workflows/test-install.yml'
  push:
    branches: [main]
    paths:
      - 'install.sh'
      - 'install-dev.sh'
      - 'e2e/install/**'
      - '.github/workflows/test-install.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-install:
    name: install.sh (${{ matrix.shell }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - shell: sh
            test: e2e/install/sh_test.sh
            run: sh e2e/install/sh_test.sh
          - shell: bash
            test: e2e/install/bash_test.sh
            run: bash e2e/install/bash_test.sh
          - shell: zsh
            test: e2e/install/zsh_test.sh
            run: zsh e2e/install/zsh_test.sh
            install: zsh
          - shell: fish
            test: e2e/install/fish_test.fish
            run: fish e2e/install/fish_test.fish
            install: fish

    steps:
      - uses: actions/checkout@v6

      - name: Install ${{ matrix.shell }}
        if: matrix.install
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.install }}

      - name: Run tests (${{ matrix.shell }})
        run: ${{ matrix.run }}

  test-install-dev:
    name: install-dev.sh lookup
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Run install-dev.sh lookup tests
        run: sh e2e/install/install_dev_lookup_test.sh
