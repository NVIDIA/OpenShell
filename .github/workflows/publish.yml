name: Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/publish.yml
  workflow_dispatch:
    inputs:
      publish_python_only:
        description: "Skip build jobs and only publish wheels from S3"
        required: false
        type: boolean
        default: false
      wheel_version:
        description: "Wheel version in S3 (required for publish_python_only)"
        required: false
        type: string

permissions:
  contents: read
  packages: write

defaults:
  run:
    shell: bash

jobs:
  # ---------------------------------------------------------------------------
  # Build container images to GHCR (same as E2E pipeline)
  # ---------------------------------------------------------------------------
  build-server:
    if: >-
      (github.event_name != 'pull_request' || github.head_ref == 'fix-publish-version/an') &&
      !(github.event_name == 'workflow_dispatch' && inputs.publish_python_only)
    uses: ./.github/workflows/docker-build.yml
    with:
      component: server
      push: ${{ github.event_name != 'pull_request' }}

  build-sandbox:
    if: >-
      (github.event_name != 'pull_request' || github.head_ref == 'fix-publish-version/an') &&
      !(github.event_name == 'workflow_dispatch' && inputs.publish_python_only)
    uses: ./.github/workflows/docker-build.yml
    with:
      component: sandbox
      push: ${{ github.event_name != 'pull_request' }}

  build-cluster:
    if: >-
      (github.event_name != 'pull_request' || github.head_ref == 'fix-publish-version/an') &&
      !(github.event_name == 'workflow_dispatch' && inputs.publish_python_only)
    uses: ./.github/workflows/docker-build.yml
    with:
      component: cluster
      push: ${{ github.event_name != 'pull_request' }}

  # ---------------------------------------------------------------------------
  # Run E2E tests against the built images (temporarily disabled)
  # ---------------------------------------------------------------------------
  # e2e:
  #   needs: [build-server, build-sandbox, build-cluster]
  #   uses: ./.github/workflows/e2e-test.yml
  #   with:
  #     image-tag: ${{ github.sha }}

  # ---------------------------------------------------------------------------
  # Publish multi-arch container images to ECR
  # ---------------------------------------------------------------------------
  publish-containers:
    if: >-
      github.event_name != 'pull_request' &&
      !(github.event_name == 'workflow_dispatch' && inputs.publish_python_only)
    name: Publish Containers
    needs: [build-server, build-sandbox, build-cluster]
    runs-on: build-amd64
    timeout-minutes: 120
    container:
      image: ghcr.io/nvidia/nv-agent-env/ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --privileged
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
    env:
      MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-west-2
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Log in to ECR
        run: aws ecr get-login-password --region us-west-2 | docker login --username AWS --password-stdin 524473328983.dkr.ecr.us-west-2.amazonaws.com

      - name: Set up Docker Buildx
        uses: ./.github/actions/setup-buildx

      - name: Build and push multi-arch images to ECR
        env:
          DOCKER_BUILDER: navigator
          IMAGE_TAG: dev
          TAG_LATEST: "true"
        run: mise run --no-prepare docker:publish:cluster:multiarch

  # ---------------------------------------------------------------------------
  # Build Python wheels and stage them in S3
  # ---------------------------------------------------------------------------
  build-python-wheels:
    if: >-
      (github.event_name != 'pull_request' || github.head_ref == 'fix-publish-version/an') &&
      !(github.event_name == 'workflow_dispatch' && inputs.publish_python_only)
    name: Stage Python Wheels
    needs: [build-server, build-sandbox, build-cluster]
    runs-on: build-amd64
    timeout-minutes: 120
    outputs:
      wheel_version: ${{ steps.version.outputs.wheel_version }}
      s3_prefix: ${{ steps.upload.outputs.s3_prefix }}
    container:
      image: ghcr.io/nvidia/nv-agent-env/ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --privileged
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
    env:
      MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      NAV_PYPI_S3_BUCKET: navigator-pypi-artifacts
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-west-2
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Set up Docker Buildx
        uses: ./.github/actions/setup-buildx

      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Compute Python version
        id: version
        run: |
          set -euo pipefail
          WHEEL_VERSION=$(uv run python build/scripts/release.py get-version --python)
          echo "wheel_version=${WHEEL_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build Python wheels
        run: |
          set -euo pipefail
          WHEEL_VERSION="${{ steps.version.outputs.wheel_version }}"
          mise run version:set
          trap "mise run version:reset" EXIT
          NAVIGATOR_VERSION="$WHEEL_VERSION" mise run python:build:multiarch
          NAVIGATOR_VERSION="$WHEEL_VERSION" mise run python:build:macos
          ls -la target/wheels/*.whl

      - name: Upload wheels to S3
        id: upload
        run: |
          set -euo pipefail
          WHEEL_VERSION="${{ steps.version.outputs.wheel_version }}"
          S3_PREFIX="navigator/${WHEEL_VERSION}"
          aws s3 cp target/wheels/ "s3://${NAV_PYPI_S3_BUCKET}/${S3_PREFIX}/" --recursive --exclude "*" --include "*.whl"
          aws s3 ls "s3://${NAV_PYPI_S3_BUCKET}/${S3_PREFIX}/"
          echo "s3_prefix=${S3_PREFIX}" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Publish Python wheels to Artifactory from S3 staging
  # ---------------------------------------------------------------------------
  publish-python:
    if: >-
      always() &&
      (github.event_name != 'pull_request' || github.head_ref == 'fix-publish-version/an') &&
      (
        needs.build-python-wheels.result == 'success' ||
        (github.event_name == 'workflow_dispatch' && inputs.publish_python_only && inputs.wheel_version != '')
      )
    name: Publish Python
    needs: [build-python-wheels]
    runs-on: [self-hosted, nv]
    timeout-minutes: 60
    env:
      MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      NAV_PYPI_S3_BUCKET: navigator-pypi-artifacts
      NAV_PYPI_REPOSITORY_URL: https://urm.nvidia.com/artifactory/api/pypi/nv-shared-pypi-local
      NAV_PYPI_USERNAME: ${{ secrets.NAV_PYPI_USERNAME }}
      NAV_PYPI_PASSWORD: ${{ secrets.NAV_PYPI_PASSWORD }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-west-2
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install publish dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip uv

          if ! command -v aws >/dev/null 2>&1; then
            ARCH="$(uname -m)"
            case "$ARCH" in
              x86_64|amd64) AWSCLI_ARCH="x86_64" ;;
              aarch64|arm64) AWSCLI_ARCH="aarch64" ;;
              *)
                echo "Unsupported architecture for AWS CLI installer: $ARCH" >&2
                exit 1
                ;;
            esac

            rm -rf aws awscliv2.zip
            curl --fail --silent --show-error --location \
              "https://awscli.amazonaws.com/awscli-exe-linux-${AWSCLI_ARCH}.zip" \
              --output awscliv2.zip
            python -c "import zipfile; zipfile.ZipFile('awscliv2.zip').extractall('.')"
            ./aws/install --bin-dir "$HOME/.local/bin" --install-dir "$HOME/.local/aws-cli" --update
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.local/bin:$PATH"
          fi

          aws --version
          uv --version

      - name: Resolve wheel version and S3 prefix
        id: source
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.publish_python_only }}" = "true" ]; then
            WHEEL_VERSION="${{ inputs.wheel_version }}"
            if [ -z "$WHEEL_VERSION" ]; then
              echo "wheel_version input is required when publish_python_only=true" >&2
              exit 1
            fi
            S3_PREFIX="navigator/${WHEEL_VERSION}"
          else
            WHEEL_VERSION="${{ needs.build-python-wheels.outputs.wheel_version }}"
            S3_PREFIX="${{ needs.build-python-wheels.outputs.s3_prefix }}"
          fi

          echo "wheel_version=${WHEEL_VERSION}" >> "$GITHUB_OUTPUT"
          echo "s3_prefix=${S3_PREFIX}" >> "$GITHUB_OUTPUT"
          echo "Using wheel version: ${WHEEL_VERSION}"
          echo "Using S3 prefix: ${S3_PREFIX}"

      - name: List and download versioned wheels from S3
        run: |
          set -euo pipefail
          WHEEL_VERSION="${{ steps.source.outputs.wheel_version }}"
          S3_PREFIX="${{ steps.source.outputs.s3_prefix }}"
          OBJECT_COUNT=$(aws s3api list-objects-v2 --bucket "$NAV_PYPI_S3_BUCKET" --prefix "${S3_PREFIX}/" --query "length(Contents)" --output text)
          if [ "$OBJECT_COUNT" = "None" ] || [ "$OBJECT_COUNT" = "0" ]; then
            echo "No wheel artifacts found for ${WHEEL_VERSION} at s3://${NAV_PYPI_S3_BUCKET}/${S3_PREFIX}/" >&2
            exit 1
          fi
          aws s3api list-objects-v2 --bucket "$NAV_PYPI_S3_BUCKET" --prefix "${S3_PREFIX}/" --query "Contents[].Key" --output text
          mkdir -p target/wheels
          aws s3 cp "s3://${NAV_PYPI_S3_BUCKET}/${S3_PREFIX}/" target/wheels/ --recursive --exclude "*" --include "*.whl"
          ls -la target/wheels/*.whl

      - name: Publish wheels to Artifactory
        run: |
          set -euo pipefail
          WHEEL_VERSION="${{ steps.source.outputs.wheel_version }}"
          uv run python build/scripts/release.py python-publish --version "$WHEEL_VERSION"
