  # ---------------------------------------------------------------------------
  # Build CLI binaries (Linux musl — static)
  # ---------------------------------------------------------------------------
  build-cli-linux:
    name: Build CLI (Linux)
    runs-on: build-amd64
    timeout-minutes: 60
    container:
      image: ghcr.io/nvidia/nv-agent-env/ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --privileged
    env:
      MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SCCACHE_MEMCACHED_ENDPOINT: ${{ vars.SCCACHE_MEMCACHED_ENDPOINT }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Compute version
        id: version
        run: |
          set -euo pipefail
          CARGO_VERSION=$(uv run python tasks/scripts/release.py get-version --cargo)
          echo "cargo_version=${CARGO_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install musl toolchains
        run: |
          set -euo pipefail
          apt-get update
          apt-get install -y --no-install-recommends \
            musl-tools cmake \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          rm -rf /var/lib/apt/lists/*

      - name: Add Rust musl targets
        run: |
          rustup target add x86_64-unknown-linux-musl
          rustup target add aarch64-unknown-linux-musl

      - name: Patch workspace version
        if: steps.version.outputs.cargo_version != ''
        run: |
          set -euo pipefail
          sed -i -E '/^\[workspace\.package\]/,/^\[/{s/^version[[:space:]]*=[[:space:]]*".*"/version = "'"${{ steps.version.outputs.cargo_version }}"'"/}' Cargo.toml

      - name: Build x86_64-unknown-linux-musl
        run: cargo build --release --target x86_64-unknown-linux-musl -p navigator-cli

      - name: Build aarch64-unknown-linux-musl
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_musl: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_musl: aarch64-linux-gnu-g++
        run: cargo build --release --target aarch64-unknown-linux-musl -p navigator-cli

      - name: Package binaries
        run: |
          set -euo pipefail
          mkdir -p artifacts

          # x86_64
          tar -czf artifacts/nemoclaw-x86_64-unknown-linux-musl.tar.gz \
            -C target/x86_64-unknown-linux-musl/release nemoclaw

          # aarch64
          tar -czf artifacts/nemoclaw-aarch64-unknown-linux-musl.tar.gz \
            -C target/aarch64-unknown-linux-musl/release nemoclaw

          ls -lh artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-linux
          path: artifacts/*.tar.gz
          retention-days: 5

  # ---------------------------------------------------------------------------
  # Build CLI binary (macOS aarch64 via osxcross)
  # ---------------------------------------------------------------------------
  build-cli-macos:
    name: Build CLI (macOS)
    runs-on: build-amd64
    timeout-minutes: 60
    container:
      image: ghcr.io/nvidia/nv-agent-env/ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --privileged
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
    env:
      MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SCCACHE_MEMCACHED_ENDPOINT: ${{ vars.SCCACHE_MEMCACHED_ENDPOINT }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Set up Docker Buildx
        uses: ./.github/actions/setup-buildx

      - name: Compute version
        id: version
        run: |
          set -euo pipefail
          CARGO_VERSION=$(uv run python tasks/scripts/release.py get-version --cargo)
          echo "cargo_version=${CARGO_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build macOS binary via Docker
        run: |
          set -euo pipefail
          docker buildx build \
            --file deploy/docker/Dockerfile.cli-macos \
            --build-arg NEMOCLAW_CARGO_VERSION="${{ steps.version.outputs.cargo_version }}" \
            --build-arg CARGO_TARGET_CACHE_SCOPE="${{ github.sha }}" \
            --target binary \
            --output type=local,dest=out/ \
            .

      - name: Package binary
        run: |
          set -euo pipefail
          mkdir -p artifacts
          tar -czf artifacts/nemoclaw-aarch64-apple-darwin.tar.gz \
            -C out nemoclaw
          ls -lh artifacts/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-macos
          path: artifacts/*.tar.gz
          retention-days: 5

  # ---------------------------------------------------------------------------
  # Create / update the "tip" GitHub Release with CLI binaries
  # ---------------------------------------------------------------------------
  release-tip:
    name: Release Tip
    needs: [build-cli-linux, build-cli-macos]
    runs-on: build-amd64
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux CLI artifacts
        uses: actions/download-artifact@v4
        with:
          name: cli-linux
          path: release/

      - name: Download macOS CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: cli-macos
          path: release/

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd release
          sha256sum *.tar.gz > nemoclaw-checksums-sha256.txt
          cat nemoclaw-checksums-sha256.txt

      - name: Move tip tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -fa tip -m "Latest Continuous Release" "${GITHUB_SHA}"
          git push --force origin tip

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: 'NemoClaw Tip ("Nightly")'
          prerelease: true
          tag_name: tip
          target_commitish: ${{ github.sha }}
          body: |
            This tip release is automatically built on every commit to main that passes CI.

            > **Warning**: This is a nightly build, not a tagged release.
            > We recommend using tagged releases for production use.

            ### Assets
            | File | Description |
            |------|-------------|
            | `nemoclaw-x86_64-unknown-linux-musl.tar.gz` | Linux x86_64 (static binary) |
            | `nemoclaw-aarch64-unknown-linux-musl.tar.gz` | Linux aarch64 / ARM64 (static binary) |
            | `nemoclaw-aarch64-apple-darwin.tar.gz` | macOS Apple Silicon |
            | `nemoclaw-checksums-sha256.txt` | SHA256 checksums for all archives |

            ### Quick install

            ```bash
            # Linux x86_64
            curl -fsSL https://github.com/NVIDIA/NemoClaw/releases/download/tip/nemoclaw-x86_64-unknown-linux-musl.tar.gz | tar xz
            sudo mv nemoclaw /usr/local/bin/

            # Linux aarch64
            curl -fsSL https://github.com/NVIDIA/NemoClaw/releases/download/tip/nemoclaw-aarch64-unknown-linux-musl.tar.gz | tar xz
            sudo mv nemoclaw /usr/local/bin/

            # macOS (Apple Silicon)
            curl -fsSL https://github.com/NVIDIA/NemoClaw/releases/download/tip/nemoclaw-aarch64-apple-darwin.tar.gz | tar xz
            sudo mv nemoclaw /usr/local/bin/
            ```
          files: |
            release/nemoclaw-x86_64-unknown-linux-musl.tar.gz
            release/nemoclaw-aarch64-unknown-linux-musl.tar.gz
            release/nemoclaw-aarch64-apple-darwin.tar.gz
            release/nemoclaw-checksums-sha256.txt
