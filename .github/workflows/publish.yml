name: Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # ---------------------------------------------------------------------------
  # Build container images to GHCR (same as E2E pipeline)
  # ---------------------------------------------------------------------------
  build-server:
    uses: ./.github/workflows/docker-build.yml
    with:
      component: server

  build-sandbox:
    uses: ./.github/workflows/docker-build.yml
    with:
      component: sandbox

  build-cluster:
    uses: ./.github/workflows/docker-build.yml
    with:
      component: cluster

  # ---------------------------------------------------------------------------
  # Run E2E tests against the built images (temporarily disabled)
  # ---------------------------------------------------------------------------
  # e2e:
  #   needs: [build-server, build-sandbox, build-cluster]
  #   uses: ./.github/workflows/e2e-test.yml
  #   with:
  #     image-tag: ${{ github.sha }}

  # ---------------------------------------------------------------------------
  # Publish multi-arch container images to ECR
  # ---------------------------------------------------------------------------
  publish-containers:
    name: Publish Containers
    needs: [build-server, build-sandbox, build-cluster]
    runs-on: build-amd64
    timeout-minutes: 120
    container:
      image: ghcr.io/nvidia/nv-agent-env/ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --privileged
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
    env:
      MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-west-2
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Log in to ECR
        run: aws ecr get-login-password --region us-west-2 | docker login --username AWS --password-stdin 524473328983.dkr.ecr.us-west-2.amazonaws.com

      - name: Set up Docker Buildx
        uses: ./.github/actions/setup-buildx

      - name: Build and push multi-arch images to ECR
        env:
          DOCKER_BUILDER: navigator
          IMAGE_TAG: dev
          TAG_LATEST: "true"
        run: mise run --no-prepare docker:publish:cluster:multiarch

  # ---------------------------------------------------------------------------
  # Publish Python wheels to GitHub Packages PyPI
  # ---------------------------------------------------------------------------
  publish-python:
    name: Publish Python
    needs: [build-server, build-sandbox, build-cluster]
    runs-on: build-amd64
    timeout-minutes: 120
    container:
      image: ghcr.io/nvidia/nv-agent-env/ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --privileged
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
    env:
      MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      NAV_PYPI_REPOSITORY_URL: https://pypi.pkg.github.com/NVIDIA/nv-agent-env/
      NAV_PYPI_USERNAME: ${{ github.actor }}
      NAV_PYPI_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Set up Docker Buildx
        uses: ./.github/actions/setup-buildx

      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Build and publish Python wheels
        run: mise run --no-prepare python:publish
