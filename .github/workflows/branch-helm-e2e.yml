name: Branch Helm E2E

on:
  push:
    branches:
      - "pull-request/[0-9]+"
  workflow_dispatch: {}

permissions: {}

jobs:
  pr_metadata:
    name: Resolve PR metadata
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
    steps:
      - uses: actions/checkout@v6

      - id: gate
        uses: ./.github/actions/pr-gate
        with:
          required_label: test:e2e-helm

  helm-e2e-rust:
    name: Helm E2E (rust)
    needs: [pr_metadata]
    if: needs.pr_metadata.outputs.should_run == 'true'
    runs-on: linux-amd64-cpu8
    timeout-minutes: 60
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/nvidia/openshell/ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --privileged
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
    env:
      MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      HELM_E2E_CLUSTER_NAME: helm-e2e-${{ github.run_id }}-rust
    steps:
      - uses: actions/checkout@v6

      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install tools
        run: mise install --locked

      - name: Run Helm E2E (Rust)
        run: mise run e2e:helm:rust

  helm-e2e-python:
    name: Helm E2E (python)
    needs: [pr_metadata]
    if: needs.pr_metadata.outputs.should_run == 'true'
    runs-on: linux-amd64-cpu8
    timeout-minutes: 60
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/nvidia/openshell/ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --privileged
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
    env:
      MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      HELM_E2E_CLUSTER_NAME: helm-e2e-${{ github.run_id }}-python
    steps:
      - uses: actions/checkout@v6

      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install tools
        run: mise install --locked

      - name: Install Python dependencies
        run: uv sync --frozen && mise run --no-deps python:proto

      - name: Run Helm E2E (Python)
        run: mise run e2e:helm:python
