      app: alpha-exchange
  template:
    metadata:
      labels:
        app: alpha-exchange
    spec:
      containers:
        - name: alpha-exchange
          image: node:22-alpine
          imagePullPolicy: IfNotPresent
          command: ["node", "/demo/protected-service.js"]
          ports:
