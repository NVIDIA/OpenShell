            - name: ACCESS_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: openshell-spiffe-token-exchange-demo
                  key: access-token-secret
            - name: ACCESS_TOKEN_ISSUER
              value: http://token-exchange-issuer.default.svc.cluster.local
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          volumeMounts:
            - name: scripts
              mountPath: /demo
              readOnly: true
      volumes:
        - name: scripts
          configMap:
            name: openshell-spiffe-token-exchange-demo-scripts
---
apiVersion: v1
kind: Service
metadata:
  name: alpha-exchange
  namespace: default
spec:
  selector:
    app: alpha-exchange
  ports:
    - name: http
      port: 80
      targetPort: http
---
