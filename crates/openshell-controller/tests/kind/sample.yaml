# Smallest viable OpenShellSandbox CR for iteration testing.

apiVersion: openshell.nvidia.com/v1alpha1
kind: OpenShellSandbox
metadata:
  name: sample
  namespace: default
spec:
  image: ghcr.io/nvidia/openshell/sandbox:latest
  policyYaml: |
    version: 1
  expose:
    port: 8080
