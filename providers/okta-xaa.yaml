id: okta-xaa
display_name: Okta XAA
description: Okta Cross App Access tokens minted from the authenticated OpenShell user's OIDC ID token
category: other
credentials:
  - name: xaa_access_token
    description: Okta XAA delegated access token for downstream resources
    env_vars: [OKTA_XAA_ACCESS_TOKEN]
    required: true
    auth_style: bearer
    header_name: authorization
    refresh:
      strategy: okta_xaa
      token_url: https://example.okta.com/oauth2/v1/token
      refresh_before_seconds: 300
      max_lifetime_seconds: 3600
      material:
        - name: requesting_client_id
          description: XAA requesting app client ID used for the ID token to ID-JAG exchange
          required: true
        - name: requesting_client_secret
          description: XAA requesting app client secret used for the ID token to ID-JAG exchange
          required: true
          secret: true
        - name: subject_token
          description: Authenticated user OIDC id_token captured during refresh configuration
          required: false
          secret: true
        - name: resource_client_id
          description: XAA resource app client ID used for the ID-JAG to access-token exchange
          required: true
        - name: resource_client_secret
          description: XAA resource app client secret used for the ID-JAG to access-token exchange
          required: true
          secret: true
        - name: audience
          description: Okta XAA resource authorization server issuer used as the audience for the ID-JAG exchange
          required: true
        - name: resource
          description: Optional resource URL sent during the ID token to ID-JAG exchange. Defaults to the audience when omitted.
          required: false
        - name: resource_token_url
          description: Optional resource app token endpoint. Defaults to the audience issuer with /oauth2/v1/token.
          required: false
        - name: scope
          description: Space-delimited scopes requested for the delegated token
          required: false
binaries:
  - /usr/bin/curl
  - /usr/local/bin/curl
