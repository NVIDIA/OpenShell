id: okta-obo
display_name: Okta OBO
description: Okta delegated access tokens minted on behalf of the authenticated OpenShell user
category: other
credentials:
  - name: obo_access_token
    description: Okta delegated access token for downstream APIs
    env_vars: [OKTA_OBO_ACCESS_TOKEN]
    required: true
    auth_style: bearer
    header_name: authorization
    refresh:
      strategy: oauth2_token_exchange
      token_url: https://example.okta.com/oauth2/default/v1/token
      refresh_before_seconds: 300
      max_lifetime_seconds: 3600
      material:
        - name: client_id
          description: Okta OIDC application client ID used for token exchange
          required: true
        - name: sandbox_id
          description: OpenShell sandbox ID bound to the authenticated user token
          required: true
        - name: audience
          description: Downstream Okta resource audience for the delegated token
          required: true
        - name: client_secret
          description: Okta client secret for confidential token-exchange clients
          required: false
          secret: true
        - name: scope
          description: Space-delimited scopes requested for the delegated token
          required: false
binaries:
  - /usr/bin/curl
  - /usr/local/bin/curl
