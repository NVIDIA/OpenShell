id: google-drive
display_name: Google Drive
description: Google Drive API access
category: data
credentials:
  - name: drive_access_token
    description: Google Drive access token
    env_vars: [GOOGLE_DRIVE_ACCESS_TOKEN]
    required: true
    auth_style: bearer
    header_name: authorization
    refresh:
      strategy: google_service_account_jwt
      token_url: https://oauth2.googleapis.com/token
      scopes: [https://www.googleapis.com/auth/drive]
      refresh_before_seconds: 300
      max_lifetime_seconds: 3600
      material:
        - name: client_email
          description: Google service account email
          required: true
        - name: private_key
          description: Google service account private key
          required: true
          secret: true
        - name: subject
          description: Optional delegated user email for domain-wide delegation
endpoints:
  - host: www.googleapis.com
    port: 443
    protocol: rest
    access: read-write
    enforcement: enforce
  - host: drive.googleapis.com
    port: 443
    protocol: rest
    access: read-write
    enforcement: enforce
binaries: [/usr/bin/curl, /usr/local/bin/curl]
