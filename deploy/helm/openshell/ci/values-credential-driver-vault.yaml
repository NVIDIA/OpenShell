# Local Vault credential-driver validation overlay.
#
# Use with:
#   skaffold run -p credential-driver-vault
#
# The profile assumes another process has already deployed a Vault-compatible
# backend. Local e2e validation deploys OpenBao in the `openbao` namespace with
# a Kubernetes auth role named `openshell-gateway` bound to the OpenShell
# gateway ServiceAccount in the `openshell` namespace.

server:
  credentialDrivers:
    vault:
      enabled: true
      address: http://openbao.openbao.svc.cluster.local:8200
      role: openshell-gateway
