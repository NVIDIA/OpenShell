# CI/dev overlay for exercising the Kubernetes supervisor split-pod topology.
#
# This topology relies on Kubernetes NetworkPolicy enforcement: the agent pod is
# isolated to its paired supervisor pod plus DNS. The local k3s/k3d workflow
# must therefore run with the k3s network policy controller enabled, or with a
# custom policy-enforcing CNI installed before deploying this profile.
#
# Merge after values.yaml and ci/values-skaffold.yaml:
#   helm install ... -f values.yaml -f ci/values-skaffold.yaml -f ci/values-split-pod.yaml
#
# Or set:
#   OPENSHELL_E2E_KUBE_EXTRA_VALUES=deploy/helm/openshell/ci/values-split-pod.yaml
# before running `mise run e2e:kubernetes`.
supervisor:
  topology: split-pod
