{{/*
Chart-managed db Secret for external PostgreSQL only.
When postgres.deploy=true the Bitnami subchart creates the service-binding
secret (with uri key) via postgres.serviceBindings.enabled=true.
When postgres.external.existingSecret is set the user brings their own Secret.
*/}}
{{- if and .Values.postgres.enabled (not .Values.postgres.deploy) (not .Values.postgres.external.existingSecret) }}
{{- $host := required "postgres.external.host is required when postgres.deploy=false and no postgres.external.existingSecret is provided" .Values.postgres.external.host }}
{{- $pw := required "postgres.external.password is required when postgres.deploy=false and no postgres.external.existingSecret is provided" .Values.postgres.external.password }}
{{- $port := toString (int (default 5432 .Values.postgres.external.port)) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openshell.dbSecretName" . }}
  labels:
    {{- include "openshell.labels" . | nindent 4 }}
type: Opaque
data:
  host: {{ $host | b64enc | quote }}
  port: {{ $port | b64enc | quote }}
  username: {{ .Values.postgres.external.username | b64enc | quote }}
  password: {{ $pw | b64enc | quote }}
  database: {{ .Values.postgres.external.database | b64enc | quote }}
  uri: {{ printf "postgresql://%s:%s@%s:%s/%s" (.Values.postgres.external.username | urlquery) ($pw | urlquery) $host $port .Values.postgres.external.database | b64enc | quote }}
{{- end }}
