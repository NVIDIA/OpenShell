{{- if not (or .Values.server.credentialDrivers.kubernetesSecrets.enabled .Values.server.credentialDrivers.vault.enabled) }}
{{- $secretName := include "openshell.credentialStorageKeyEncryptionKeySecretName" . -}}
{{- $secretKey := include "openshell.credentialStorageKeyEncryptionKeySecretKey" . -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $encodedKeyEncryptionKey := randBytes 32 | b64enc -}}
{{- if $existing -}}
{{- $existingData := get $existing "data" | default dict -}}
{{- if not (hasKey $existingData $secretKey) -}}
{{- fail (printf "existing credential storage key-encryption key Secret %s/%s is missing key %s" .Release.Namespace $secretName $secretKey) -}}
{{- end -}}
{{- $encodedKeyEncryptionKey = index $existingData $secretKey -}}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openshell.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  {{ $secretKey }}: {{ $encodedKeyEncryptionKey | quote }}
{{- end }}
