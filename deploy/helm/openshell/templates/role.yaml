apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "openshell.fullname" . }}-sandbox
  namespace: {{ include "openshell.sandboxNamespace" . }}
  labels:
    {{- include "openshell.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - agents.x-k8s.io
    resources:
      - sandboxes
      - sandboxes/status
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  # Warm-pool extension CRDs (issue #1879). The gateway reconciles the
  # operator-owned SandboxTemplate + SandboxWarmPool, creates/deletes a
  # SandboxClaim per warm-pooled sandbox, and reads claims during the
  # IssueSandboxToken identity re-anchor. The sandbox pod ServiceAccount is a
  # separate identity and is intentionally NOT granted any of these — a
  # compromised sandbox must not be able to mutate claims, templates, or pools.
  #
  # Least privilege: only the verbs the gateway actually exercises are granted.
  # Templates/pools are reconciled with server-side apply (create + patch only —
  # never update/get/list/watch). Claims are created, deleted, read back, and
  # watched (create/delete/get/list/watch) — the driver runs a live watcher on
  # SandboxClaims to surface warm/claim-bound sandboxes. The gateway never writes
  # the controller-owned status subresources, so they are omitted.
  - apiGroups:
      - extensions.agents.x-k8s.io
    resources:
      - sandboxtemplates
      - sandboxwarmpools
    verbs:
      - create
      - patch
  - apiGroups:
      - extensions.agents.x-k8s.io
    resources:
      - sandboxclaims
    verbs:
      - create
      - delete
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - get
      - list
      - watch
  # Per-sandbox identity: TokenReview authenticates the projected token from
  # the configured sandbox service account, then the gateway resolves the
  # returned pod name and UID to the pod's `openshell.io/sandbox-id`
  # annotation. patch is intentionally NOT granted — the annotation is set
  # once at pod create and must remain immutable for the lifetime of the
  # sandbox.
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
